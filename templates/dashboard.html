{% extends "layout.html" %}

{% block content %}

<h2>Total Expenses: ${{total}}</h2>

<table border="1">

<tr>
<th>Amount</th>
<th>Category</th>
<th>Description</th>
<th>Delete</th>
</tr>

{% for t in transactions %}

<tr>
<td>{{t.amount}}</td>
<td>{{t.category}}</td>
<td>{{t.description}}</td>
<td><a href="/delete/{{t.id}}">Delete</a></td>
</tr>

{% endfor %}

</table>

{% endblock %}
